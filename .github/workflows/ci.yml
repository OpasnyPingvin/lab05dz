name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ lcov curl libgtest-dev libgmock-dev

      - name: Configure CMake
        run: |
          rm -rf build
          cmake -H. -Bbuild -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests with debug
        run: |
          cd build
          echo "=== Running test_account ==="
          ./tests/test_account --gtest_print_time=1
          echo "Exit code: $?"
          echo "=== Running test_transaction ==="
          ./tests/test_transaction --gtest_print_time=1
          echo "Exit code: $?"
          echo "=== Checking gcda files ==="
          find . -name "*.gcda" -exec ls -la {} \;
          echo "=== Checking gcda file content (first 100 bytes) ==="
          for f in $(find . -name "*.gcda"); do
            echo "File: $f"
            xxd $f | head -5
          done

      - name: Generate coverage
        run: |
          cd build
          echo "=== Running gcov manually ==="
          gcov banking/CMakeFiles/banking.dir/Account.cpp.gcno
          gcov banking/CMakeFiles/banking.dir/Transaction.cpp.gcno
          cat Account.cpp.gcov | head -20

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: build/coverage_filtered.info
          format: lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
