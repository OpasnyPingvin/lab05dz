name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++-13 libgtest-dev libgmock-dev lcov curl
          sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-13 100

      - name: Configure CMake
        run: |
          rm -rf build
          cmake -H. -Bbuild -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=g++-13

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure --verbose
          ls -la
          ls -la banking/CMakeFiles/banking.dir/
          ls -la tests/CMakeFiles/test_account.dir/

      - name: Generate coverage report
        run: |
          cd build
          gcov-13 --version
          find . -name "*.gcno" -exec gcov-13 -b -c {} \;
          lcov --capture --directory . --output-file coverage.info --test-name test --no-external --rc lcov_branch_coverage=1
          lcov --remove coverage.info '*/tests/*' '*/usr/*' '*/banking/*.h' '*/googletest/*' -o coverage_filtered.info
          lcov --list coverage_filtered.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: build/coverage_filtered.info
          format: lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
