name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ lcov curl libgtest-dev libgmock-dev

      - name: Configure CMake
        run: |
          rm -rf build
          cmake -H. -Bbuild -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests
        run: |
          cd build
          ./tests/test_account
          ./tests/test_transaction

      - name: Generate coverage with lcov
        run: |
          cd build
          lcov --capture --directory . --output-file coverage.info --no-external --ignore-errors mismatch,empty,unused
          lcov --remove coverage.info '*/tests/*' '*/usr/*' '*/banking/*.h' '*/googletest/*' '*/gmock/*' --output-file coverage_filtered.info --ignore-errors unused
          lcov --list coverage_filtered.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: build/coverage_filtered.info
          format: lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
