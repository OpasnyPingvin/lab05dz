name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ lcov curl libgtest-dev libgmock-dev

      - name: Configure CMake
        run: |
          rm -rf build
          cmake -H. -Bbuild -DENABLE_COVERAGE=ON -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Run tests
        run: |
          cd build
          ./tests/test_account
          ./tests/test_transaction

      - name: Generate coverage
        run: |
          cd build
          gcovr --root .. --xml --output coverage.xml --gcov-ignore-parse-errors
          gcovr --root .. --print-summary

      - name: Convert to lcov format
        run: |
          cd build
          gcovr --root .. --lcov --output coverage.lcov

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          file: build/coverage.lcov
          format: lcov
          github-token: ${{ secrets.GITHUB_TOKEN }}
